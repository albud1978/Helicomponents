services:
  superset:
    image: local/superset-echarts6-deps:latest
    build:
      context: .
      dockerfile: Dockerfile.plugin-deps
      args:
        SUPERSET_PLUGIN_IMAGE: ${SUPERSET_PLUGIN_IMAGE:-local/superset-echarts6:latest}

  superset-worker:
    image: local/superset-echarts6-deps:latest
    build:
      context: .
      dockerfile: Dockerfile.plugin-deps
      args:
        SUPERSET_PLUGIN_IMAGE: ${SUPERSET_PLUGIN_IMAGE:-local/superset-echarts6:latest}

  superset-beat:
    image: local/superset-echarts6-deps:latest
    build:
      context: .
      dockerfile: Dockerfile.plugin-deps
      args:
        SUPERSET_PLUGIN_IMAGE: ${SUPERSET_PLUGIN_IMAGE:-local/superset-echarts6:latest}
