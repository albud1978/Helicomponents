sql: "WITH events_daily AS (\n    SELECT\n        version_date AS version_date,\n\
  \        version_id AS version_id,\n        group_by AS group_by,\n        aircraft_number\
  \ AS aircraft_number,\n        day_date AS day_date,\n        argMax(status_id,\
  \ idx) AS status_id\n    FROM default.sim_masterv2_v9\n    WHERE group_by IN (1,\
  \ 2)\n    GROUP BY version_date, version_id, group_by, aircraft_number, day_date\n\
  ),\nversion_bounds AS (\n    SELECT\n        version_date AS version_date,\n   \
  \     version_id AS version_id,\n        max(day_date) AS version_max_day\n    FROM\
  \ events_daily\n    GROUP BY version_date, version_id\n),\naircraft_span AS (\n\
  \    SELECT\n        e.version_date AS version_date,\n        e.version_id AS version_id,\n\
  \        e.group_by AS group_by,\n        e.aircraft_number AS aircraft_number,\n\
  \        min(e.day_date) AS aircraft_min_day,\n        vb.version_max_day AS aircraft_max_day\n\
  \    FROM events_daily e\n    INNER JOIN version_bounds vb\n      ON vb.version_date\
  \ = e.version_date\n     AND vb.version_id = e.version_id\n    GROUP BY e.version_date,\
  \ e.version_id, e.group_by, e.aircraft_number, vb.version_max_day\n),\nevents_packed\
  \ AS (\n    SELECT\n        version_date AS version_date,\n        version_id AS\
  \ version_id,\n        group_by AS group_by,\n        aircraft_number AS aircraft_number,\n\
  \        arraySort(x -> x.1, groupArray((day_date, status_id))) AS day_status_pairs\n\
  \    FROM events_daily\n    GROUP BY version_date, version_id, group_by, aircraft_number\n\
  ),\nexpanded_days AS (\n    SELECT\n        a.version_date AS version_date,\n  \
  \      a.version_id AS version_id,\n        a.group_by AS group_by,\n        a.aircraft_number\
  \ AS aircraft_number,\n        addDays(a.aircraft_min_day, n) AS day_date\n    FROM\
  \ aircraft_span a\n    ARRAY JOIN range(dateDiff('day', a.aircraft_min_day, a.aircraft_max_day)\
  \ + 1) AS n\n),\ndaily_aircraft_status AS (\n    SELECT\n        d.version_date\
  \ AS version_date,\n        d.version_id AS version_id,\n        d.group_by AS group_by,\n\
  \        d.aircraft_number AS aircraft_number,\n        d.day_date AS day_date,\n\
  \        if(\n            arrayLastIndex(x -> x <= d.day_date, arrayMap(p -> p.1,\
  \ p.day_status_pairs)) = 0,\n            0,\n            arrayMap(p -> p.2, p.day_status_pairs)[arrayLastIndex(x\
  \ -> x <= d.day_date, arrayMap(p -> p.1, p.day_status_pairs))]\n        ) AS status_id\n\
  \    FROM expanded_days d\n    INNER JOIN events_packed p\n      ON p.version_date\
  \ = d.version_date\n     AND p.version_id = d.version_id\n     AND p.group_by =\
  \ d.group_by\n     AND p.aircraft_number = d.aircraft_number\n),\ndaily_status_counts\
  \ AS (\n    SELECT\n        version_date AS version_date,\n        version_id AS\
  \ version_id,\n        group_by AS group_by,\n        day_date AS day_date,\n  \
  \      status_id AS status_id,\n        countDistinct(aircraft_number) AS status_count_ffill\n\
  \    FROM daily_aircraft_status\n    GROUP BY version_date, version_id, group_by,\
  \ day_date, status_id\n),\ndaily_grid AS (\n    SELECT\n        d.version_date AS\
  \ version_date,\n        d.version_id AS version_id,\n        d.group_by AS group_by,\n\
  \        d.day_date AS day_date,\n        s.status_id AS status_id\n    FROM (\n\
  \        SELECT DISTINCT\n            version_date AS version_date,\n          \
  \  version_id AS version_id,\n            group_by AS group_by,\n            day_date\
  \ AS day_date\n        FROM daily_aircraft_status\n    ) d\n    CROSS JOIN (\n \
  \       SELECT arrayJoin([1, 2, 3, 4, 6, 7]) AS status_id\n    ) s\n)\nSELECT\n\
  \    g.version_date,\n    g.version_id,\n    formatDateTime(parseDateTimeBestEffort(toString(g.version_date)),\
  \ '%d-%m-%Y') AS version_date_ddmmyyyy,\n    g.group_by,\n    g.status_id,\n   \
  \ g.day_date,\n    ifNull(c.status_count_ffill, 0) AS status_count_ffill\nFROM daily_grid\
  \ g\nLEFT JOIN daily_status_counts c\n  ON c.version_date = g.version_date\n AND\
  \ c.version_id = g.version_id\n AND c.group_by = g.group_by\n AND c.day_date = g.day_date\n\
  \ AND c.status_id = g.status_id"
