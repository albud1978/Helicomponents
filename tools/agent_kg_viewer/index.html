длительность - initial_repair_days) > tolerance`\n\n### 2. Runtime repair agents (все остальные выходы из repair)\nДля них: `repair_days` при выходе должен быть `< tolerance` (т.е. repair_days декрементировался почти до 0). Текущая проверка `repair_days < repair_time - tolerance` — это то же самое но для runtime exits, где агент входит с `repair_days = repair_time` и выходит с `repair_days ≈ 0`.\n\nФактически для runtime: `repair_days_at_exit <= tolerance` (т.к. декремент может перешагнуть через 0 из-за adaptive_days).\n\n### Реализация\n\n```python\n# 1. min_day\nmin_day_query = f\"\"\"\nSELECT min(day_u16) FROM {table}\nWHERE version_id = %(vid)s{vd_filter} AND group_by IN (1,2)\n\"\"\"\nmin_day = client.execute(min_day_query, params)[0][0]\n\n# 2. Day0 repair agents: их initial repair_days\nday0_query = f\"\"\"\nSELECT aircraft_number, group_by, repair_days AS initial_repair_days\nFROM {table}\nWHERE version_id = %(vid)s{vd_filter} AND group_by IN (1,2)\n  AND day_u16 = %(min_day)s AND pre_status_id = 4\n\"\"\"\nday0_rows = client.execute(day0_query, {**params, \"min_day\": min_day})\nday0_set = {(int(r[0]), int(r[1])) for r in day0_rows}\nday0_initial = {(int(r[0]), int(r[1])): int(r[2]) for r in day0_rows}\n\n# 3. Все выходы из repair\nall_exits_query = f\"\"\"\nSELECT aircraft_number, group_by, day_u16, repair_days, repair_time, status_id\nFROM {table}\nWHERE version_id = %(vid)s{vd_filter} AND group_by IN (1,2)\n  AND pre_status_id = 4 AND status_id != 4\nORDER BY aircraft_number, group_by, day_u16\n\"\"\"\nall_exits = client.execute(all_exits_query, params)\n\n# 4. Классификация\n\nday0_violations = 0\nday0_details = []\nruntime_violations = 0\nruntime_details = []\n\nfor acn, gb, day, rd, rt, st in all_exits:\n    key = (int(acn), int(gb))\n    if key in day0_set:\n        # Day0 agent: проверяем фактическую длительность ≈ initial_repair_days\n        init_rd = day0_initial[key]\n        actual_duration = int(day) - int(min_day)\n        expected = init_rd\n        if abs(actual_duration - expected) > tolerance:\n            day0_violations += 1\n            day0_details.append(...)\n        # Убираем из set чтобы следующий выход этого агента считался runtime\n        day0_set.discard(key)\n    else:\n        # Runtime: repair_days при выходе должен быть ≈ 0\n        if int(rd) > tolerance:\n            runtime_violations += 1\n            runtime_details.append(...)\n```\n\n### Формат вывода\n\n```\nTEMP-1 repair duration: PASS/FAIL\n  tolerance=15 days\n  day0_agents=7, day0_violations=0\n  runtime_exits=N, runtime_violations=0\n  total_violations=0\n  (если есть violations — вывести samples)\n```\n\n### Требования\n- CLI: --version-id, --version-date, --table, --tolerance (default 15)\n- group_by IN (1,2) обязателен\n- import из ch_client\n- Exit code: 0=PASS, 1=FAIL\n- Не использовать Float64\n\nПроверить py_compile. Верни в handoff: Changes, Evidence.", "goal": "Задача: адаптировать скрипт `code/validation/temp1_repair_duration.py` для учёта Day0 repair agents.\n\n## Контекст\n\nTEMP-1 проверяет: \"Длительность ремонта — агент проводит в repair ровно repair_time дней\".\n\nТекущая проблема: агенты, стартовавшие в status=4 (repair) на Day 0, имеют `repair_days` < `repair_time` на момент начала симуляции — это уже начатый ремонт. Скрипт считает их \"early exits\" потому что `repair_days=0` при выходе, а `repair_time=180`. Но агент за время симуляции пробыл в ремонте ровно `initial_repair_days` дней — это корректно.\n\n## Что нужно сделать\n\nРазделить проверку на ДВЕ категории:\n\n### 1. Day0 repair agents (pre_status_id=4 на min_day)\nДля них: фактическая длительность в ремонте должна ≈ `repair_days` на первом шаге (initial_repair_days). Т.е. при выходе `фактическая_длительность ≈ initial_repair_days ± tolerance`.\n\nЛогика:\n- Найти агентов с `pre_status_id=4` на `min_day` — запомнить их `repair_days` как `initial_repair_days`\n- Найти их выход из repair (pre_status_id=4, status_id!=4) — запомнить `day_u16` как e     const CAPSULES_DATA = {"version": 1, "description": "Индекс контекстных капсул проекта. Оркестратор читает этот файл, чтобы узнать какие капсулы существуют и что покрывают.", "updated": "2026-02-11", "capsules": [{"id": "limiter_v8", "path": "docs/limiter_v8_capsule.md", "domain": "Оркестратор V8, слои RTC, адаптивные шаги", "covers": ["orchestrator_limiter_v8.py", "rtc_limiter_*.py", "adaptive steps", "deterministic_dates"], "invariants": ["INV-9", "GPU-5", "TEMP-1", "TEMP-4"], "updated": "2026-02-11"}, {"id": "transitions", "path": "docs/transitions_capsule.md", "domain": "Матрица переходов, condition precedent/subsequent, порядок RTC", "covers": ["transitions_rules.json", "rtc_state_transitions_*.py", "state machine"], "invariants": ["INV-1", "INV-4", "INV-8", "INV-9", "GPU-6"], "updated": "2026-02-11"}, {"id": "quota", "path": "docs/quota_capsule.md", "domain": "Квотирование P1/P2/P3/P4, RepairLine, MessageBucket, spawn", "covers": ["quota_rules.json", "rtc_quota_v8_*.py", "rtc_repair_lines_v8.py", "rtc_spawn_dynamic_*.py"], "invariants": ["INV-2", "INV-3", "TEMP-2", "TEMP-3"], "updated": "2026-02-11"}, {"id": "validation", "path": "docs/validation_capsule.md", "domain": "Валидация результатов симуляции, SQL-first проверки, скрипты", "covers": ["invariants.json", "sim_validation_*.py", "validate_*.py", "validation_rules.py"], "invariants": ["INV-1", "INV-2", "INV-3", "INV-4", "INV-5", "INV-6", "INV-7", "INV-8"], "updated": "2026-02-11"}, {"id": "flame_gpu", "path": "docs/flame_gpu_capsule.md", "domain": "Ограничения FLAME GPU, RTC правила, типы данных, MacroProperty", "covers": ["FLAME GPU 2 API", "RTC functions", "MacroProperty", "MessageBucket", "NVRTC"], "invariants": ["GPU-1", "GPU-2", "GPU-3", "GPU-4", "GPU-5", "GPU-6"], "updated": "2026-02-11"}, {"id": "etl_extract", "path": "docs/etl_extract_capsule.md", "domain": "ETL пайплайн, Extract, загрузка датасетов, heli_pandas", "covers": ["extract_master.py", "code/extract/*.py", "heli_pandas", "flight_progr     function esc(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function sortByDateDesc(items, key) {
      return [...items].sort((a, b) => (b[key] || '').localeCompare(a[key] || ''));
    }

    function sortByDateAsc(items, key) {
      return [...items].sort((a, b) => (a[key] || '').localeCompare(b[key] || ''));
    }

    function approvalBadgeClass(status) {
      if (status === 'approved') return 'badge-approval-approved';
      if (status === 'rejected') return 'badge-approval-rejected';
      if (status === 'pending') return 'badge-approval-pending';
      return 'badge-completed';
    }

    function renderWorkflows(workflows) {
      const list = asArray(workflows);
      if (!list.length) return '<div class="empty">Нет workflow</div>';
      return list.map(w => {
        const statusClass = w.status === 'active' ? 'badge-active' : 'badge-completed';
        return `
          <div class="workflow-card">
            <div class="workflow-header">
              <span class="badge ${statusClass}">${esc(w.status)}</span>
              <span class="badge badge-phase">${esc(w.phase)}</span>
              <span class="badge badge-owner">${esc(w.owner)}</span>
              <strong>${esc(w.workflow_id)}</strong>
            </div>
            <div class="workflow-goal">${esc(w.goal)}</div>
            <div class="workflow-meta">Created: ${esc(w.created_at || '?')} | Updated: ${esc(w.updated_at || '?')}</div>
          </div>`;
      }).join('');
    }

    function renderHandoffs(handoffs) {
      const sorted = sortByDateDesc(asArray(handoffs), 'created_at');
      if (!sorted.length) return '<div class="empty">Нет handoff\'ов</div>';
      return '<div class="timeline">' + sorted.map(h => {
        const approvalRaw = [h.approval_gate_id || '', h.approval_status || '', h.approval_source || '']
          .filter(Boolean)
          .join(' | ');
        const approvalBadge = h.approval_status
          ? `<span class="badge ${approvalBadgeClass(h.approval_status)}">${esc(h.approval_status)}</span>`
          : '';
        return `
        <div class="handoff-card">
          <div class="handoff-header">
            <span class="handoff-agent">${esc(h.agent)}</span>
            <span class="badge badge-phase">${esc(h.workflow_id)}</span>
            ${approvalBadge}
            <span style="font-size:11px;color:#666">${esc(h.created_at || '')}</span>
          </div>
          <div class="handoff-body">
            <div class="handoff-field"><span class="field-label">TraceID:</span> <span class="field-value">${esc(h.trace_id || 'N/A')}</span></div>
            <div class="handoff-field"><span class="field-label">PlanStepID:</span> <span class="field-value">${esc(h.plan_step_id || 'N/A')}</span></div>
            <div class="handoff-field"><span class="field-label">UserGoal:</span> <span class="field-value">${esc(h.user_goal || h.goal || '')}</span></div>
            <div class="handoff-field"><span class="field-label">Changes:</span> <span class="field-value">${esc(h.changes || '')}</span></div>
            <div class="handoff-field"><span class="field-label">Facts:</span> <span class="field-value">${esc(h.facts || h.evidence || '')}</span></div>
            ${h.assumptions ? `<div class="handoff-field"><span class="field-label">Assumptions:</span> <span class="field-value">${esc(h.assumptions)}</span></div>` : ''}
            ${approvalRaw ? `<div class="handoff-field"><span class="field-label">ApprovalGate:</span> <span class="field-value">${esc(approvalRaw)}</span></div>` : ''}
            ${h.drift_check ? `<div class="handoff-field"><span class="field-label">DriftCheck:</span> <span class="field-value">${esc(h.drift_check)}</span></div>` : ''}
            <div class="handoff-field"><span class="field-label">Risks:</span> <span class="field-value">${esc(h.risks || '')}</span></div>
            <div class="handoff-field"><span class="field-label">NextOwner:</span> <span class="field-value">${esc(h.next_owner || '')}</span></div>
          </div>
        </div>`;
      }).join('') + '</div>';
    }

    function renderWorkflowTrace(workflows, handoffs) {
      const wfList = asArray(workflows);
      const handoffList = sortByDateAsc(asArray(handoffs), 'created_at');
      if (!wfList.length || !handoffList.length) {
        return '<div class="empty">Недостаточно данных для WorkflowTrace</div>';
      }

      const grouped = {};
      for (const h of handoffList) {
        const wf = h.workflow_id || 'unknown';
        if (!grouped[wf]) grouped[wf] = [];
        grouped[wf].push(h);
      }

      return wfList.map(w => {
        const items = grouped[w.workflow_id] || [];
        if (!items.length) return '';
        const rows = items.map(i => `
          <div class="trace-item">
            <div class="trace-title">${esc(i.agent || '?')} -> ${esc(i.next_owner || '?')}</div>
            <div class="trace-meta">
              ${esc(i.created_at || '')} | step=${esc(i.plan_step_id || 'N/A')} | trace=${esc(i.trace_id || 'N/A')}
            </div>
          </div>
        `).join('');
        return `
          <div class="workflow-card">
            <div class="workflow-header">
              <strong>${esc(w.workflow_id)}</strong>
              <span class="badge badge-phase">${esc(w.phase || '?')}</span>
              <span class="badge ${w.status === 'active' ? 'badge-active' : 'badge-completed'}">${esc(w.status || '?')}</span>
            </div>
            ${rows}
          </div>
        `;
      }).join('') || '<div class="empty">Нет trace-событий</div>';
    }

    function renderGovernanceGates(handoffs) {
      const rows = sortByDateDesc(asArray(handoffs).filter(h =>
        (h.approval_gate_id || h.approval_status || h.approval_source)
      ), 'created_at');

      if (!rows.length) return '<div class="empty">ApprovalGate записи отсутствуют</div>';

      const body = rows.map(r => `
        <tr>
          <td>${esc(r.workflow_id || '')}</td>
          <td>${esc(r.agent || '')}</td>
          <td>${esc(r.approval_gate_id || 'N/A')}</td>
          <td>${esc(r.approval_status || 'N/A')}</td>
          <td>${esc(r.approval_source || 'N/A')}</td>
          <td>${esc(r.trace_id || 'N/A')}</td>
          <td>${esc(r.plan_step_id || 'N/A')}</td>
          <td>${esc(r.created_at || '')}</td>
        </tr>
      `).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Workflow</th><th>Agent</th><th>GateID</th><th>Status</th>
                <th>Source</th><th>TraceID</th><th>PlanStepID</th><th>Created</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function renderRlmReuse(handoffs, capsulesData) {
      const capsules = asArray((capsulesData || {}).capsules);
      if (!capsules.length) return '<div class="empty">capsules_manifest.json не найден или пуст</div>';

      const handoffList = asArray(handoffs);
      const rows = capsules.map(c => {
        const id = (c.id || '').toString();
        const idLower = id.toLowerCase();
        let mentions = 0;
        const workflows = new Set();

        for (const h of handoffList) {
          const body = `${h.changes || ''} ${h.facts || ''}`.toLowerCase();
          if (!idLower || !body.includes(idLower)) continue;
          mentions += 1;
          if (h.workflow_id) workflows.add(h.workflow_id);
        }

        return {
          id,
          domain: c.domain || '',
          updated: c.updated || c.updated_at || '',
          mentions,
          workflows: Array.from(workflows),
        };
      }).sort((a, b) => b.mentions - a.mentions || a.id.localeCompare(b.id));

      const body = rows.map(r => `
        <tr>
          <td>${esc(r.id || '')}</td>
          <td>${esc(r.domain || '')}</td>
          <td>${esc(r.updated || 'N/A')}</td>
          <td>${esc(String(r.mentions))}</td>
          <td>${esc(r.workflows.join(', ') || 'N/A')}</td>
        </tr>
      `).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>CapsuleID</th><th>Domain</th><th>Updated</th><th>MentionsInHandoffs</th><th>Workflows</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function renderContexts(contexts) {
      const sorted = sortByDateDesc(asArray(contexts), 'updated_at');
      if (!sorted.length) return '<div class="empty">Нет контекстов</div>';
      return sorted.map(c => `
        <div class="context-card">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="context-type">${esc(c.context_type)}</span>
            <span style="font-size:11px;color:#666">${esc(c.agent || '?')} | ${esc(c.updated_at || '')}</span>
            <span style="font-size:11px;color:#666">${esc(c.workflow_id || '')}</span>
          </div>
          <div class="context-content">${esc((c.content || '').substring(0, 1000))}${(c.content || '').length > 1000 ? '...' : ''}</div>
        </div>`).join('');
    }

    function render(data, capsulesData) {
      const app = document.getElementById('app');
      const workflows = asArray(data.workflows);
      const handoffs = asArray(data.handoffs);
      const contexts = asArray(data.contexts);
      let html = '';

      html += '<div class="section"><h2>Workflows</h2>';
      html += renderWorkflows(workflows);
      html += '</div>';

      html += '<div class="section grid-two">';
      html += '<div><h2>WorkflowTrace</h2>' + renderWorkflowTrace(workflows, handoffs) + '</div>';
      html += '<div><h2>GovernanceGates</h2>' + renderGovernanceGates(handoffs) + '</div>';
      html += '</div>';

      html += '<div class="section"><h2>Handoffs</h2>';
      html += renderHandoffs(handoffs);
      html += '</div>';

      html += '<div class="section"><h2>RLMReuse</h2>';
      html += renderRlmReuse(handoffs, capsulesData);
      html += '</div>';

      html += '<div class="section"><h2>Contexts</h2>';
      html += renderContexts(contexts);
      html += '</div>';

      app.innerHTML = html;
    }

    render(KG_DATA, CAPSULES_DATA);
    
  </script>
