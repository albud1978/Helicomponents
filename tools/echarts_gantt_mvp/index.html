<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repairline Gantt MVP (ECharts)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; color: #111827; background: #f9fafb; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 12px 16px 20px; }
    .title { margin: 0 0 8px; font-size: 18px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .toolbar input { padding: 6px 8px; min-width: 340px; }
    .toolbar button { padding: 7px 12px; cursor: pointer; }
    #meta { font-size: 12px; color: #4b5563; margin-bottom: 8px; }
    #chart { width: 100%; height: 78vh; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Gantt по ремонтным линиям (custom ECharts)</h1>
    <div class="toolbar">
      <label for="dataPath">JSON:</label>
      <input id="dataPath" value="./data.json">
      <button id="loadBtn">Загрузить</button>
      <label for="localFile">Локально:</label>
      <input id="localFile" type="file" accept="application/json">
      <button id="loadLocalBtn">Открыть локально</button>
    </div>
    <div id="meta">Ожидание данных...</div>
    <div id="chart"></div>
  </div>

  <script>
    const chart = echarts.init(document.getElementById('chart'));
    const metaEl = document.getElementById('meta');
    const pathInput = document.getElementById('dataPath');
    const loadBtn = document.getElementById('loadBtn');
    const localFileInput = document.getElementById('localFile');
    const loadLocalBtn = document.getElementById('loadLocalBtn');

    function colorByAircraft(acn) {
      const h = (Number(acn) * 37) % 360;
      return `hsl(${h}, 70%, 55%)`;
    }

    function toTs(dateStr) {
      return new Date(`${dateStr}T00:00:00Z`).getTime();
    }

    function fmtDate(ts) {
      return new Date(ts).toISOString().slice(0, 10);
    }

    function buildOption(rows) {
      const yCategories = [...new Set(rows.map(r => String(r.line_id)))]
        .sort((a, b) => Number(a) - Number(b));

      const data = rows.map(r => ({
        value: [
          String(r.line_id),
          toTs(r.start_date),
          toTs(r.end_date_exclusive),
          Number(r.aircraft_number),
          Number(r.group_by),
          Number(r.version_id),
          Number(r.duration_days),
        ]
      }));

      function renderItem(params, api) {
        const lineId = String(api.value(0));
        const start = api.coord([api.value(1), lineId]);
        const end = api.coord([api.value(2), lineId]);
        const barH = api.size([0, 1])[1] * 0.62;

        const rect = echarts.graphic.clipRectByRect(
          {
            x: start[0],
            y: start[1] - barH / 2,
            width: Math.max(1, end[0] - start[0]),
            height: barH,
          },
          {
            x: params.coordSys.x,
            y: params.coordSys.y,
            width: params.coordSys.width,
            height: params.coordSys.height,
          }
        );

        return rect && {
          type: 'rect',
          shape: rect,
          style: api.style({
            fill: colorByAircraft(api.value(3)),
            stroke: '#1f2937',
            lineWidth: 0.5,
          }),
        };
      }

      return {
        animation: false,
        grid: { left: 80, right: 30, top: 18, bottom: 70 },
        tooltip: {
          trigger: 'item',
          formatter: p => {
            const v = p.value;
            return [
              `line_id: ${v[0]}`,
              `aircraft_number: ${v[3]}`,
              `group_by: ${v[4]}`,
              `version_id: ${v[5]}`,
              `days: ${v[6]}`,
              `${fmtDate(v[1])} → ${fmtDate(v[2])}`
            ].join('<br/>');
          }
        },
        xAxis: { type: 'time' },
        yAxis: { type: 'category', data: yCategories },
        dataZoom: [
          { type: 'slider', xAxisIndex: 0, height: 18, bottom: 22 },
          { type: 'inside', xAxisIndex: 0 }
        ],
        series: [
          {
            type: 'custom',
            renderItem,
            encode: { x: [1, 2], y: 0, tooltip: [0, 3, 4, 5, 6] },
            data
          }
        ]
      };
    }

    function renderPayload(payload, options = {}) {
      const rows = payload.rows || [];
      chart.setOption(buildOption(rows), true);

      const f = payload.filters || {};
      const sourceNote = options.fallback ? ' | источник: data.js (fallback)' : '';
      metaEl.textContent =
        `Rows: ${rows.length} | table: ${payload.source_table || '-'} | version_date: ${f.version_date ?? '-'} | version_ids: ${(f.version_ids || []).join(',')} | group_by: ${(f.group_by || []).join(',')}${sourceNote}`;
    }

    function setFetchError(err) {
      const message = err?.message || String(err);
      const low = message.toLowerCase();
      const needHint = low.includes('failed to fetch') || low.includes('networkerror');
      metaEl.textContent = `Ошибка: ${message}${needHint ? ' Откройте data.json через кнопку локальной загрузки.' : ''}`;
    }

    async function loadAndRender(path) {
      metaEl.textContent = 'Загрузка...';
      const resp = await fetch(path, { cache: 'no-store' });
      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status} при чтении ${path}`);
      }
      const payload = await resp.json();
      renderPayload(payload);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Не удалось загрузить ${src}`));
        document.head.appendChild(script);
      });
    }

    async function loadFromScript(path) {
      await loadScript(path);
      const payload = window.__GANTT_PAYLOAD__;
      if (!payload) {
        throw new Error(`window.__GANTT_PAYLOAD__ не найден после загрузки ${path}`);
      }
      renderPayload(payload, { fallback: true });
    }

    async function loadAndRenderWithFallback(path) {
      try {
        await loadAndRender(path);
      } catch (err) {
        const isFile = window.location.protocol === 'file:';
        const isDefaultPath = path.trim() === './data.json';
        if (!isFile || !isDefaultPath) {
          throw err;
        }
        metaEl.textContent = 'Fetch не удался, пробую data.js...';
        await loadFromScript('./data.js');
      }
    }

    loadBtn.addEventListener('click', () => {
      loadAndRenderWithFallback(pathInput.value.trim()).catch(setFetchError);
    });

    loadLocalBtn.addEventListener('click', () => {
      const file = localFileInput.files && localFileInput.files[0];
      if (!file) {
        metaEl.textContent = 'Выберите JSON-файл для локальной загрузки.';
        return;
      }
      metaEl.textContent = 'Чтение файла...';
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = typeof reader.result === 'string' ? reader.result : '';
          const payload = JSON.parse(text);
          renderPayload(payload);
        } catch (err) {
          const message = err?.message || String(err);
          metaEl.textContent = `Ошибка: ${message}`;
        }
      };
      reader.onerror = () => {
        metaEl.textContent = 'Ошибка чтения файла';
      };
      reader.readAsText(file);
    });

    window.addEventListener('resize', () => chart.resize());
    loadAndRenderWithFallback(pathInput.value).catch(setFetchError);
  </script>
</body>
</html>
